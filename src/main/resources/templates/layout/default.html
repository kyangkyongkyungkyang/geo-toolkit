<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'GEO Toolkit | 무드앤무드'">GEO Toolkit</title>
    <meta name="description" th:content="${pageDescription} ?: '여성복 쇼핑몰 GEO 최적화 데모'" content="">
    <meta name="last-modified" th:content="${lastModified} ?: '2026-02-26'" content="">

    <!-- Organization Schema (전체 페이지 공통) -->
    <script th:if="${orgSchema}" type="application/ld+json" th:utext="${orgSchema}"></script>

    <!-- Breadcrumb Schema -->
    <script th:if="${breadcrumbSchema}" type="application/ld+json" th:utext="${breadcrumbSchema}"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- 페이지별 추가 head 요소 삽입 지점 -->
    <th:block layout:fragment="head"></th:block>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <a th:href="@{/demo}" class="logo">GEO Toolkit Demo</a>
            <nav>
                <a th:href="@{/demo}">데모 대시보드</a>
                <a th:href="@{/products/linen-wide-pants-ivory}">상품 페이지</a>
                <a th:href="@{/categories/bottoms/wide-pants}">카테고리</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <!-- Breadcrumb -->
        <nav th:if="${breadcrumbs}" aria-label="breadcrumb" class="breadcrumb">
            <ol>
                <li th:each="bc, stat : ${breadcrumbs}">
                    <a th:if="${bc[1] != null}" th:href="${bc[1]}" th:text="${bc[0]}"></a>
                    <span th:if="${bc[1] == null}" th:text="${bc[0]}" aria-current="page"></span>
                    <span th:if="${!stat.last}"> &gt; </span>
                </li>
            </ol>
        </nav>

        <!-- 페이지 본문 삽입 지점 -->
        <main layout:fragment="content">
        </main>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p th:if="${lastModified}">
                마지막 업데이트: <time th:datetime="${lastModified}" th:text="${lastModified}"></time>
            </p>
            <p>GEO Toolkit Demo - 여성복 쇼핑몰 AI 검색 최적화 구현 키트</p>
        </div>
    </footer>

</body>
</html>
